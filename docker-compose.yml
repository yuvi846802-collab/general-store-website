version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hakeem_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecomm_network

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/hakeem_store?schema=public
      - JWT_SECRET=supersecret_dev_key
      - PORT=5000
    depends_on:
      - postgres
    networks:
      - ecomm_network

volumes:
  postgres_data:

networks:
  ecomm_network:
    driver: bridge
